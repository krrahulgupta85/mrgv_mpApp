            const selectedSection = URLParameters.get('section') || 'history';
            const renderWrapper = document.getElementById('dynamicContentBlock');
            const dataRecord = tradeDatabase[selectedSection] || tradeDatabase.history;

            renderWrapper.innerHTML = `
                <div class="space-y-4">
                    <span class="inline-block bg-amber-50 text-brandGold text-[10px] font-bold uppercase tracking-widest px-3 py-1 border border-brandGold/30">
                        ${dataRecord.badge}
                    </span>
                    <h1 class="text-2xl sm:text-3xl font-black text-brandDark uppercase tracking-tight">${dataRecord.title}</h1>
                    <div class="w-16 h-1 bg-brandGold"></div>
                    <div class="pt-4 text-gray-700 leading-relaxed font-normal">${dataRecord.content}</div>
                    
                    <div class="bg-gray-50 p-6 rounded-lg border border-gray-100 mt-6 grid grid-cols-2 gap-4 text-xs">
                        <p><strong>Shipping Options:</strong> FOB, CIF, CFR (Incoterms 2020)</p>
