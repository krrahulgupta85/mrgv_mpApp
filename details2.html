                        brandNav: '#1C2541',
                        brandGold: '#D4AF37',
                        brandLightBg: '#F7F9FC'

                }

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="text-gray-800 bg-brandLightBg font-sans antialiased min-h-screen flex flex-col justify-between">

    <header class="bg-brandNav border-b border-gray-800 shadow-lg text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2 font-black text-white uppercase tracking-wider">

                <div class="flex flex-col">

                    <span class="text-[7px] font-bold tracking-[0.15em] text-brandGold">GLOBAL VENTURES</span>

            </div>
        </div>

    <footer class="bg-gray-950 text-gray-600 text-[11px] py-8 text-center border-t border-gray-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-2">

            <p class="opacity-30 text-[9px] uppercase tracking-wider">developed by rahul</p>
        </div>

                `
            },
            vision_mission: {
                badge: "Core Organizational Benchmarks",
                title: "Vision, Mission & Ethical Framework",
                content: `
                    <h4 class="font-bold text-sm text-brandDark uppercase tracking-wider mb-2">Our Vision Statement</h4>
                    <p class="text-sm text-gray-600 leading-relaxed mb-6">To become a globally recognized benchmark export house known for premium product integration, complete transparency, and customer-centric commodity management solutions, while helping Indian primary production sectors thrive in competitive international markets.</p>
                    <h4 class="font-bold text-sm text-brandDark uppercase tracking-wider mb-3">Our Mission Parameters</h4>

                        <li class="flex items-start space-x-3"><i class="fa-solid fa-check text-brandGold mt-1 text-xs"></i> <span>To scale the global footprint of high-purity Indian industrial aggregates and essential whole spices.</span></li>
                    </ul>
                `
            },
            services: {
                badge: "Capability Breakdown",
                title: "Comprehensive Sourcing Services Architecture",
                content: `

                        <div class="border p-5 bg-gray-50 rounded-lg">
                            <h5 class="font-bold text-brandDark mb-2 uppercase tracking-wider">Export Documentation Mastery</h5>

                title: "Technical Mineral Profiles & Material Grade Systems",
                content: `
                    <p class="text-sm text-gray-600 leading-relaxed mb-4">India stands as an absolute leader in premium industrial minerals. Our catalog includes high-purity minerals processed to match rigid structural application standards:</p>

        function dynamicRoutingEngine() {
            const URLParameters = new URLSearchParams(window.location.search);
            const targetedSection = URLParameters.get('section') || 'history';
            const displayTarget = document.getElementById('dynamicContentBlock');

            const pageRecord = corporateDatabase[targetedSection] || corporateDatabase.history;

            displayTarget.innerHTML = `
                <div class="space-y-4">
                    <span class="inline-block bg-amber-50 text-brandGold text-[10px] font-bold uppercase tracking-[0.2em] px-3 py-1 border border-brandGold/30">
                        ${pageRecord.badge}
                    </span>
                    <h1 class="text-2xl sm:text-3xl font-black text-brandDark tracking-tight uppercase">
                        ${pageRecord.title}
                    </h1>
                    <div class="w-16 h-1 bg-brandGold"></div>
                    <div class="pt-4 text-gray-700 leading-relaxed font-normal">
                        ${pageRecord.content}
                    </div>
                    <div class="pt-8 border-t border-gray-100 mt-8 flex flex-wrap gap-4 items-center justify-between">
                        <a href="index.html#contact" class="inline-block bg-brandDark text-white font-bold px-6 py-3.5 text-xs uppercase tracking-widest hover:bg-brandGold hover:text-brandDark transition-all rounded">
                            Initiate Sourcing Contract Brief
                        </a>
                        <a href="https://api.whatsapp.com/send?phone=7566075002&text=I%20am%20reviewing%20the%20technical%20specification%20log%20for%20${encodeURIComponent(pageRecord.title)}" 
                           target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center space-x-2 text-emerald-600 hover:text-emerald-700 text-xs font-bold uppercase tracking-wider">
                            <i class="fab fa-whatsapp text-sm"></i> <span>Discuss via WhatsApp Chat</span>
                        </a>
                    </div>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', dynamicRoutingEngine);
    </script>
</body>
</html>
