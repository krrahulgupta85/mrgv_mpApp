                    { name: "Bay Leaves", img: ".//img//Bay.png", desc: "Aromatic leaves used to impart flavor and fragrance to a variety of food preparations.", uses: ["Food flavoring", "Spice blends", "Processed foods", "Soups and sauces", "Restaurant and catering industry", "Culinary applications"] },
                    { name: "Spice Powders, Blends & Whole Spices", img: ".//img//SpicePowders.png", desc: "Processed blends under strict quality control, or whole spices that retain natural essential oils and aromas.", uses: ["Food processing industry", "Ready-to-cook products", "Retail packaging", "Hospitality industry", "Specialty food production", "Export distribution"] }
                ]
            }
        };

        function dynamicRoutingEngine() {
            const URLParameters = new URLSearchParams(window.location.search);
            const targetedSection = URLParameters.get('section') || 'history';
            const displayTarget = document.getElementById('dynamicContentBlock');

            const pageRecord = corporateDatabase[targetedSection] || corporateDatabase.history;

            let htmlContent = `
                <div class="space-y-4">
                    <span class="inline-block bg-amber-50 text-brandGold text-[10px] font-bold uppercase tracking-[0.2em] px-3 py-1 border border-brandGold/30 rounded-sm">
                        ${pageRecord.badge}
                    </span>
                    <h1 class="text-3xl sm:text-4xl font-black text-brandDark tracking-tight uppercase">
                        ${pageRecord.title}
                    </h1>
                    <div class="w-16 h-1 bg-brandGold"></div>
                    <div class="pt-4 text-gray-700 leading-relaxed font-normal text-sm sm:text-base">
                        ${pageRecord.desc}
                    </div>
            `;

            // If SubProducts exist, render the grid with IMAGES
            if (pageRecord.subProducts && pageRecord.subProducts.length > 0) {
                htmlContent += `
                    <div class="mt-12 pt-8 border-t border-gray-200">
                        <h2 class="text-2xl font-black text-brandDark uppercase tracking-wider mb-8">Detailed Sub-Products</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                `;
                pageRecord.subProducts.forEach(sub => {
                    let usesHtml = sub.uses.map(use => `<li class="flex items-start"><i class="fa-solid fa-check text-brandGold mt-1 mr-2 text-[10px]"></i> <span class="text-xs text-gray-600">${use}</span></li>`).join('');
                    
                    // Note the addition of the <img src="${sub.img}"> tag here
                    htmlContent += `
                            <div class="border border-gray-200 rounded-lg bg-white flex flex-col h-full hover:shadow-xl transition-all duration-300 overflow-hidden">
                                <img src="${sub.img}" alt="${sub.name}" class="w-full h-48 ${sub.img && (sub.img.startsWith('http://') || sub.img.startsWith('https://')) ? 'object-cover' : ''} bg-gray-100">
                                <div class="p-6 flex flex-col flex-grow">
                                    <h3 class="text-lg font-bold text-brandDark mb-2">${sub.name}</h3>
                                    <p class="text-sm text-gray-600 mb-4 flex-grow">${sub.desc}</p>
                                    <div class="bg-gray-50 p-4 rounded border border-gray-100 mt-auto">
                                        <h4 class="text-[10px] uppercase font-bold text-gray-400 mb-2 tracking-widest">Uses & Applications</h4>
                                        <ul class="space-y-1">
                                            ${usesHtml}
                                        </ul>
                                    </div>
                                </div>
                            </div>
                    `;
                });
                htmlContent += `
                        </div>
                    </div>
                `;
            }

            // If WhySource exists, render the list
            if (pageRecord.whySource && pageRecord.whySource.length > 0) {
                let whyHtml = pageRecord.whySource.map(reason => `<li class="flex items-center space-x-2"><i class="fa-solid fa-circle-check text-brandGold text-sm"></i> <span class="text-sm text-gray-700">${reason}</span></li>`).join('');
                htmlContent += `
                    <div class="mt-12 pt-8 border-t border-gray-200 bg-brandLightBg p-8 rounded-xl border border-gray-200">
                        <h2 class="text-xl font-black text-brandDark uppercase tracking-wider mb-6">Why Source from India?</h2>
                        <ul class="grid grid-cols-1 md:grid-cols-2 gap-y-3 gap-x-6">
                            ${whyHtml}
                        </ul>
                    </div>
                `;
            }

            // Final call to action buttons
            htmlContent += `
                    <div class="pt-8 border-t border-gray-100 mt-8 flex flex-wrap gap-4 items-center justify-between">
                        <a href="index.html#contact" class="inline-block bg-brandDark text-white font-bold px-6 py-3.5 text-xs uppercase tracking-widest hover:bg-brandGold hover:text-brandDark transition-all rounded shadow-lg shadow-brandDark/20">
                            Initiate Sourcing Contract Brief
                        </a>
                        <a href="https://api.whatsapp.com/send?phone=917566075002&text=I%20am%20reviewing%20the%20technical%20specification%20log%20for%20${encodeURIComponent(pageRecord.title)}" 
                           target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center space-x-2 text-emerald-600 hover:text-emerald-700 text-xs font-bold uppercase tracking-wider bg-emerald-50 px-4 py-3 rounded border border-emerald-100 transition-colors">
                            <i class="fab fa-whatsapp text-lg"></i> <span>Discuss via WhatsApp Chat</span>
                        </a>
                    </div>
                </div>
            `;

            displayTarget.innerHTML = htmlContent;
        }

        // Trigger rendering when the DOM is loaded
        window.addEventListener('DOMContentLoaded', dynamicRoutingEngine);
    </script>
</body>
</html>
